name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(grep -E '"version"\s*:' manifest.json | head -1 | sed -E 's/.*"version"\s*:\s*"([^"]+)".*/\1/')
          echo "tag=$TAG manifest=$MANIFEST_VERSION"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Build zip
        run: |
          NAME="tab-layout-sync-${GITHUB_REF_NAME}.zip"
          zip -r "$NAME" \
            manifest.json \
            background.js \
            popup.html \
            popup.css \
            popup.js \
            README.md
          echo "ARTIFACT=$NAME" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true
          draft: false
          prerelease: false
